services:
  tusremesasya:
    container_name: tusremesasya
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - .env
    ports:
      - "${API_PORT:-8010}:${API_PORT:-8010}"
    volumes:
      - .:/app
      - /app/app/ui/dist
      - ./instance:/instance
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8010}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s