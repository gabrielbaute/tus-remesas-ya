# Para ejecutar: docker compose -f docker-compose.dev.yml up -d --build
services:
  tusremesasya:
    container_name: tusremesasya
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - "${API_PORT:-8010}:8010"
    
    environment:
      - API_PORT=${API_PORT:-8010}
      - API_HOST=${API_HOST:-0.0.0.0}
      - NTFY_URL=${NTFY_URL:-}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - BINANCE_EXTRA_FIATS=${BINANCE_EXTRA_FIATS:-}
      - BINANCE_EXTRA_CRON=${BINANCE_EXTRA_CRON:-}
      - BINANCE_VES_CRON=${BINANCE_VES_CRON:-}
      - BINANCE_PEN_CRON=${BINANCE_PEN_CRON:-}
      - BCV_CRON=${BCV_CRON:-}

    volumes:
      - .:/app
      - ./instance:/app/instance
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8010}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s 
